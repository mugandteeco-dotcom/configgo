<!DOCTYPE html>
<html lang="en" data-lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configgo — Rep Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ▸ FIREBASE SDK (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyAzVWeWmTzUmxM5VRMssW3gffRBhUpDsLo",
      authDomain:        "configgo-onboarding.firebaseapp.com",
      projectId:         "configgo-onboarding",
      storageBucket:     "configgo-onboarding.firebasestorage.app",
      messagingSenderId: "345821305751",
      appId:             "1:345821305751:web:b9a0cdc527e5560a2a82d2",
      measurementId:     "G-QVFEFD5MHC"
    };
    firebase.initializeApp(firebaseConfig);

    // If already logged in, skip login page entirely
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</head>
<body class="login-body">

<!-- ============================================================ LOGIN WRAP -->
<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-mark login-logo-mark">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M26.8238 8.125H16.128C15.9436 8.125 15.7939 8.27512 15.7939 8.46008V11.3769V11.5619V18.4369V21.5399C15.7939 21.7249 15.9436 21.875 16.128 21.875H19.2207H29.916C30.1005 21.875 30.2501 21.7249 30.2501 21.5399V18.9733V18.4382V11.5632V8.46008C30.2501 8.27512 30.1005 8.125 29.916 8.125H26.8238ZM26.8251 15.6611V15.6383L26.8238 18.2416C26.8238 18.3491 26.7368 18.4364 26.6295 18.4364H19.4154C19.3082 18.4364 19.2211 18.3491 19.2211 18.2416V11.5632L19.2194 14.1466V13.4231L19.2207 11.758C19.2207 11.6505 19.3077 11.5632 19.415 11.5632H26.6291C26.7363 11.5632 26.8234 11.6505 26.8234 11.758V18.4364L26.8251 15.6611Z" fill="currentColor"/>
          <path d="M14.4562 11.3016V8.38696C14.4562 8.24243 14.3395 8.125 14.195 8.125H0.261187C0.116655 8.125 0 8.242 0 8.38696V11.3003C0 11.4449 0.116655 11.5619 0.260758 11.5623L2.5248 11.5632C2.75897 11.5632 2.87648 11.8475 2.71051 12.0135L0.0763403 14.6555C0.0274482 14.7045 0 14.7712 0 14.8404V21.6135C0 21.758 0.116655 21.8755 0.261187 21.8755H3.29164H3.42674H6.56269C6.65576 21.8755 6.74196 21.8256 6.78871 21.7447L10.5435 15.2336C10.6782 15 11.0342 15.0959 11.0342 15.3656V21.6135C11.0342 21.758 11.1508 21.8755 11.2954 21.8755H14.1954C14.3395 21.8755 14.4566 21.7585 14.4566 21.6135V14.4352C14.4566 14.2907 14.34 14.1733 14.1954 14.1733H11.1551H11.0346H7.88364C7.79057 14.1733 7.70436 14.2232 7.65762 14.304L3.91737 20.7898C3.7827 21.0233 3.42674 20.9274 3.42674 20.6577V11.8273C3.42674 11.6814 3.54468 11.5636 3.68964 11.5636H14.195C14.3395 11.5632 14.4562 11.4462 14.4562 11.3016Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="login-logo-text">Configgo Technology</span>
    </div>

    <!-- Mode Tabs: Sign In / Create Account -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="setMode('signin')">
        <span class="lang-en">Sign In</span>
        <span class="lang-tr">Giriş Yap</span>
      </button>
      <button class="auth-tab" id="tab-signup" onclick="setMode('signup')">
        <span class="lang-en">Create Account</span>
        <span class="lang-tr">Hesap Oluştur</span>
      </button>
    </div>

    <!-- Subtitle (changes by mode) -->
    <p class="login-subtitle" id="login-subtitle">
      <span class="lang-en">Sign in to access the Sales Training Hub</span>
      <span class="lang-tr">Satış Eğitim Merkezi'ne erişmek için giriş yapın</span>
    </p>

    <!-- Google Button -->
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span id="google-btn-text">
        <span class="lang-en">Continue with Google</span>
        <span class="lang-tr">Google ile Devam Et</span>
      </span>
    </button>

    <!-- Divider -->
    <div class="login-divider">
      <span></span>
      <span class="login-divider-text" id="divider-text">
        <span class="lang-en">or sign in with email</span>
        <span class="lang-tr">veya e-posta ile giriş yap</span>
      </span>
      <span></span>
    </div>

    <!-- Email / Password Form -->
    <form class="login-form" onsubmit="handleSubmit(event)">

      <div class="form-group">
        <label class="form-label" for="email">
          <span class="lang-en">Work Email</span>
          <span class="lang-tr">İş E-postası</span>
        </label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="you@configgo.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          <span class="lang-en">Password</span>
          <span class="lang-tr">Şifre</span>
        </label>
        <div class="input-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            minlength="6"
            required
          />
          <button type="button" class="pw-toggle" onclick="togglePwVisibility('password','pw-eye-show','pw-eye-hide')" title="Show/hide password" tabindex="-1">
            <svg id="pw-eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="pw-eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password — shown only in sign-up mode -->
      <div class="form-group" id="confirm-pw-group" style="display:none">
        <label class="form-label" for="confirm-password">
          <span class="lang-en">Confirm Password</span>
          <span class="lang-tr">Şifreyi Onayla</span>
        </label>
        <div class="input-wrap">
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm-password"
            autocomplete="new-password"
            placeholder="••••••••"
          />
          <button type="button" class="pw-toggle" onclick="togglePwVisibility('confirm-password','cpw-eye-show','cpw-eye-hide')" title="Show/hide password" tabindex="-1">
            <svg id="cpw-eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="cpw-eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <p class="pw-hint lang-en">Minimum 6 characters</p>
        <p class="pw-hint lang-tr">En az 6 karakter</p>
      </div>

      <!-- Error / Success Message -->
      <div class="auth-error" id="auth-error" style="display:none"></div>
      <div class="auth-success" id="auth-success" style="display:none"></div>

      <button type="submit" class="login-btn" id="login-btn">
        <span class="lang-en" id="btn-text-en">Sign In</span>
        <span class="lang-tr" id="btn-text-tr">Giriş Yap</span>
      </button>

    </form>

  </div><!-- /login-card -->

  <!-- Lang + Theme toggles bottom-right -->
  <div class="login-controls">
    <button class="theme-btn" id="login-theme-btn" onclick="toggleLoginTheme()" title="Toggle light/dark mode">
      <span class="icon-moon">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8Z" fill="currentColor"/>
        </svg>
      </span>
      <span class="icon-sun">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="currentColor"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
    </button>
    <div class="login-lang">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="tr" onclick="setLang('tr')">TR</button>
    </div>
  </div>
</div><!-- /login-wrap -->

<script>
/* ============================================================
   LOGIN PAGE — AUTH LOGIC
   ============================================================ */

let currentMode = 'signin'; // 'signin' | 'signup'

// ── Restore language & theme ───────────────────────────────────
(function() {
  const lang = localStorage.getItem('cg-lang') || 'en';
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  const theme = localStorage.getItem('cg-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
})();

// ── Theme Toggle ───────────────────────────────────────────────
function toggleLoginTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('cg-theme', next);
}

function setLang(lang) {
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  localStorage.setItem('cg-lang', lang);
}

// ── Mode Toggle: Sign In / Create Account ──────────────────────
function setMode(mode) {
  currentMode = mode;
  const lang = document.documentElement.getAttribute('data-lang');

  // Tabs
  document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');

  // Confirm password field
  const confirmGroup = document.getElementById('confirm-pw-group');
  const confirmInput = document.getElementById('confirm-password');
  confirmGroup.style.display  = mode === 'signup' ? 'flex' : 'none';
  confirmInput.required = mode === 'signup';

  // Autocomplete hint
  document.getElementById('password').setAttribute(
    'autocomplete', mode === 'signup' ? 'new-password' : 'current-password'
  );

  // Subtitle
  const subtitle = document.getElementById('login-subtitle');
  subtitle.querySelector('.lang-en').textContent =
    mode === 'signup'
      ? 'Create your Configgo rep account'
      : 'Sign in to access the Sales Training Hub';
  subtitle.querySelector('.lang-tr').textContent =
    mode === 'signup'
      ? 'Configgo temsilci hesabınızı oluşturun'
      : "Satış Eğitim Merkezi'ne erişmek için giriş yapın";

  // Divider
  const divider = document.getElementById('divider-text');
  divider.querySelector('.lang-en').textContent =
    mode === 'signup' ? 'or sign up with email' : 'or sign in with email';
  divider.querySelector('.lang-tr').textContent =
    mode === 'signup' ? 'veya e-posta ile kayıt ol' : 'veya e-posta ile giriş yap';

  // Button text
  document.getElementById('btn-text-en').textContent =
    mode === 'signup' ? 'Create Account' : 'Sign In';
  document.getElementById('btn-text-tr').textContent =
    mode === 'signup' ? 'Hesap Oluştur' : 'Giriş Yap';

  // Clear messages
  hideError();
  hideSuccess();
}

// ── Form Submit — handles both sign-in and sign-up ─────────────
function handleSubmit(e) {
  e.preventDefault();
  if (currentMode === 'signup') {
    signUpWithEmail();
  } else {
    signInWithEmail();
  }
}

// ── Google (works for both sign-in and sign-up) ────────────────
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(() => { window.location.href = 'index.html'; })
    .catch(err => showError(friendlyError(err.code) || err.message));
}

// ── Email Sign-In ──────────────────────────────────────────────
function signInWithEmail() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');

  setLoading(btn, true);
  hideError();

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => { window.location.href = 'index.html'; })
    .catch(err => {
      showError(friendlyError(err.code));
      setLoading(btn, false);
    });
}

// ── Email Sign-Up ──────────────────────────────────────────────
function signUpWithEmail() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm-password').value;
  const btn      = document.getElementById('login-btn');
  const lang     = document.documentElement.getAttribute('data-lang');

  // Client-side validation
  if (password.length < 6) {
    showError(lang === 'tr' ? 'Şifre en az 6 karakter olmalıdır.' : 'Password must be at least 6 characters.');
    return;
  }
  if (password !== confirm) {
    showError(lang === 'tr' ? 'Şifreler eşleşmiyor.' : 'Passwords do not match.');
    return;
  }

  setLoading(btn, true);
  hideError();

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => { window.location.href = 'index.html'; })
    .catch(err => {
      showError(friendlyError(err.code));
      setLoading(btn, false);
    });
}

// ── Helpers ────────────────────────────────────────────────────
function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.6' : '1';
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('auth-error').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideSuccess() {
  document.getElementById('auth-success').style.display = 'none';
}

function friendlyError(code) {
  const lang = document.documentElement.getAttribute('data-lang');
  const msgs = {
    'auth/user-not-found':       { en: 'No account found with this email.', tr: 'Bu e-posta ile hesap bulunamadı.' },
    'auth/wrong-password':       { en: 'Incorrect password. Please try again.', tr: 'Hatalı şifre. Lütfen tekrar deneyin.' },
    'auth/invalid-email':        { en: 'Please enter a valid email address.', tr: 'Geçerli bir e-posta adresi girin.' },
    'auth/too-many-requests':    { en: 'Too many attempts. Please wait and try again.', tr: 'Çok fazla deneme. Lütfen bekleyip tekrar deneyin.' },
    'auth/invalid-credential':   { en: 'Invalid email or password.', tr: 'Geçersiz e-posta veya şifre.' },
    'auth/email-already-in-use': { en: 'An account with this email already exists. Sign in instead.', tr: 'Bu e-posta zaten kayıtlı. Giriş yapmayı deneyin.' },
    'auth/weak-password':        { en: 'Password is too weak. Use at least 6 characters.', tr: 'Şifre çok zayıf. En az 6 karakter kullanın.' },
    'auth/popup-closed-by-user': { en: 'Sign-in popup was closed. Please try again.', tr: 'Giriş penceresi kapatıldı. Tekrar deneyin.' },
    'auth/network-request-failed': { en: 'Network error. Check your connection and try again.', tr: 'Ağ hatası. Bağlantınızı kontrol edin.' },
  };
  const entry = msgs[code];
  if (entry) return entry[lang] || entry.en;
  return lang === 'tr' ? 'Bir hata oluştu. Lütfen tekrar deneyin.' : 'An error occurred. Please try again.';
}

// ── Password Visibility Toggle ─────────────────────────────────
function togglePwVisibility(inputId, showId, hideId) {
  const input   = document.getElementById(inputId);
  const eyeShow = document.getElementById(showId);
  const eyeHide = document.getElementById(hideId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  eyeShow.style.display = isHidden ? 'none' : 'block';
  eyeHide.style.display = isHidden ? 'block' : 'none';
}
</script>
</body>
</html>
