<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Careers — Configgo.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #F7F7F5;
      --surface:        #FFFFFF;
      --border:         #E8E8E4;
      --text-primary:   #111110;
      --text-secondary: #6B6B67;
      --accent:         #1A1A18;
      --pill-bg:        #EEEEED;
      --pill-text:      #3A3A38;
      --active-bg:      #F0F0EE;
      --active-border:  #111110;
      --sidebar-w:      300px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 100px;
    }

    html, body {
      height: 100%;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .sidebar-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .sidebar-count span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      margin-right: 5px;
    }

    /* ── JOB LIST ── */
    .job-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .job-list::-webkit-scrollbar { width: 4px; }
    .job-list::-webkit-scrollbar-track { background: transparent; }
    .job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .job-item {
      padding: 14px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s ease, border-color 0.12s ease;
      position: relative;
    }

    .job-item:hover {
      background: var(--active-bg);
    }

    .job-item.active {
      background: var(--active-bg);
      border-color: var(--border);
    }

    .job-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 8px; bottom: 8px;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .job-item-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .job-item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .job-tag {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--pill-bg);
      padding: 3px 8px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }

    .job-tag.green {
      background: #ECFDF3;
      color: #15803D;
    }

    /* ── SIDEBAR FOOTER ── */
    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-footer p {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .sidebar-footer a {
      color: var(--text-primary);
      font-weight: 700;
      text-decoration: none;
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      position: relative;
    }

    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* iframe fills the main area */
    .job-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── WELCOME STATE ── */
    .welcome {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .welcome-icon {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .welcome h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .welcome p {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-secondary);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      .layout {
        flex-direction: column;
        height: auto;
        overflow: visible;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .job-list {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 10px 12px;
        gap: 8px;
        flex-wrap: nowrap;
      }

      .job-item {
        min-width: 200px;
        flex-shrink: 0;
      }

      .main {
        height: calc(100vh - 180px);
        min-height: 500px;
      }

      .job-frame { height: 100%; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="brand">configgo.com</div>
      <div class="sidebar-title">We're Hiring</div>
      <div class="sidebar-count">
        <span>3</span> open positions
      </div>
    </div>

    <div class="job-list">

      <!-- UX/UI Designer -->
      <div class="job-item active" onclick="loadJob(this, 'ux-designer.html')" id="job-ux">
        <div class="job-item-title">UX/UI Designer</div>
        <div class="job-item-tags">
          <span class="job-tag green">● Remote</span>
          <span class="job-tag">Mid–Senior</span>
          <span class="job-tag">Contractor</span>
        </div>
      </div>

      <!-- Motion Designer -->
      <div class="job-item" onclick="loadJob(this, 'motion-designer.html')" id="job-motion">
        <div class="job-item-title">Motion Designer</div>
        <div class="job-item-tags">
          <span class="job-tag green">● Remote</span>
          <span class="job-tag">Mid–Senior</span>
          <span class="job-tag">After Effects</span>
        </div>
      </div>

      <!-- Call Center -->
      <div class="job-item" onclick="loadJob(this, 'cagri-merkezi.html')" id="job-cc">
        <div class="job-item-title">Çağrı Merkezi Satış Temsilcisi</div>
        <div class="job-item-tags">
          <span class="job-tag green">● Uzaktan</span>
          <span class="job-tag">Tam Zamanlı</span>
          <span class="job-tag">Ankara / İst.</span>
        </div>
      </div>

    </div>

    <div class="sidebar-footer">
      <p>Don't see the right role?<br/>
        Email us at <a href="mailto:zehra.akcali@configgo.com">zehra.akcali@configgo.com</a>
      </p>
    </div>

  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="main">
    <iframe
      class="job-frame"
      id="jobFrame"
      src="ux-designer.html"
      title="Job Posting">
    </iframe>
  </main>

</div>

<script>
  function loadJob(el, src) {
    // Remove active from all
    document.querySelectorAll('.job-item').forEach(i => i.classList.remove('active'));
    // Set active
    el.classList.add('active');
    // Load iframe
    document.getElementById('jobFrame').src = src;
    // On mobile, scroll main into view
    if (window.innerWidth <= 700) {
      document.querySelector('.main').scrollIntoView({ behavior: 'smooth' });
    }
  }
</script>
</body>
</html>
